name: Test DevContainer on Self-Hosted Runner

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push DevContainer"]
    types:
      - completed
    branches:
      - test-devcontainer-build

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/devcontainer

jobs:
  test-devcontainer:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify devcontainer environment
