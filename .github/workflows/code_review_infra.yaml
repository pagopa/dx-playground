name: Infra Code Review

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      # Trigger the workflow when resources are modified
      - "infra/resources/**"
      # Trigger the workflow when the involved workflows are modified
      - ".github/workflows/code_review_infra.yaml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  code_review_dev:
    uses: pagopa/dx/.github/workflows/infra_plan.yaml@fix-env_vars-input-in-infra-workflows
    name: Code Review Infra Plan
    secrets: inherit
    with:
      environment: dev
      override_github_environment: infra-dev
      base_path: infra/resources
      env_vars: |
        TF_VAR_image_tag=sha-f21eae5
        TF_VAR_description=release candidate with spaces
        TF_VAR_image_name=ghcr.io/pagopa/example:sha-f21eae5
        TF_VAR_extra_tags=env=dev,team=platform,service=api
        TF_VAR_json={"cpu":"0.5","memory":"1Gi","enabled":true}
        TF_VAR_command_literal=$HOME $(date) ${PATH}
        TF_VAR_equals=a=b=c
        TF_VAR_empty=
