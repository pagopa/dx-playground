api_version: azuresre.ai/v1
kind: ScheduledTask
spec:
  name: dx-todo-health-check
  description: Comprehensive health check of the DX ToDo application every 30 minutes
  cronExpression: "*/30 * * * *"
  agent: ""
  agentPrompt: |
    Perform a comprehensive health check of the DX To-Do application:

    1. Check the backend FunctionApp health:
       - Query the endpoint status
       - Check FunctionApp restart count (alert if > 0 in last 15 min)
       - Verify HTTP 2xx success rate (alert if < 95%)
       - Check response time p95 (alert if > 2 seconds)
       - Verify memory and CPU utilization

    2. Check the frontend AppService health:
       - Verify the app is serving responses
       - Check HTTP error rates
       - Verify the frontend can reach the backend API

    3. Check infrastructure health:
       - AppService Plans status
       - Log Analytics workspace connectivity

    4. If ANY issues are detected:
       - Use the code-analyzer subagent to check for recent code changes
         that may have caused the issue
       - Use the incident-handler subagent to create a GitHub issue
       - Include full root cause analysis in the issue
